name: Deploy SITEA to AWS EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: self-hosted

    env:
      EC2_DEPLOY_DIR: /home/ubuntu/sitea-deploy
      PAYARA_TMP_DIR: /home/ubuntu/sitea-deploy/tmp
      PAYARA_MICRO_JAR: /home/ubuntu/payara-micro-6.2024.3.jar
      WAR_SOURCE: target/sitea.war

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install Maven (if missing)
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y maven
          else
            echo "mvn already installed"
          fi

      - name: Build WAR for production
        run: |
          mvn -B clean package \
            -Dsitea.db.host="${{ secrets.RDS_HOST }}" \
            -Dsitea.db.port="${{ secrets.RDS_PORT }}" \
            -Dsitea.db.name="${{ secrets.RDS_DB_NAME }}" \
            -Dsitea.db.user="${{ secrets.RDS_USER }}" \
            -Dsitea.db.password="${{ secrets.RDS_PASSWORD }}"
          cp target/sitea-1.0-SNAPSHOT.war "$WAR_SOURCE"

      - name: Restart Payara Micro on EC2
        run: |
          set -e
          mkdir -p "$EC2_DEPLOY_DIR"
          mkdir -p "$PAYARA_TMP_DIR"
          cp "$WAR_SOURCE" "$EC2_DEPLOY_DIR/sitea.war"

          pkill -f "payara-micro-6.2024.3.jar" || true
          JAVA_TOOL_OPTIONS="-Djava.io.tmpdir=$PAYARA_TMP_DIR" nohup java -jar "$PAYARA_MICRO_JAR" --nocluster --deploy "$EC2_DEPLOY_DIR/sitea.war" --port 8080 > "$EC2_DEPLOY_DIR/payara.log" 2>&1 &

          for _ in $(seq 1 30); do
            if curl -fsS http://127.0.0.1:8080/sitea/index.xhtml >/dev/null; then
              break
            fi
            sleep 2
          done

          tail -n 60 "$EC2_DEPLOY_DIR/payara.log"
