name: Deploy SITEA to AWS EC2

on:
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest

    env:
      EC2_DEPLOY_DIR: /home/ubuntu/sitea_java
      WAR_GLOB: target/*.war

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up JDK 21
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 21
          cache: maven

      - name: Install Maven (if missing)
        run: |
          if ! command -v mvn >/dev/null 2>&1; then
            sudo apt-get update && sudo apt-get install -y maven
          else
            echo "mvn already installed"
          fi

      - name: Build WAR for production
        run: |
          mvn -B clean package \
            -Dsitea.db.host="${{ secrets.RDS_HOST }}" \
            -Dsitea.db.port="${{ secrets.RDS_PORT }}" \
            -Dsitea.db.name="${{ secrets.RDS_DB_NAME }}" \
            -Dsitea.db.user="${{ secrets.RDS_USER }}" \
            -Dsitea.db.password="${{ secrets.RDS_PASSWORD }}"

      - name: Ensure SSH key and copy WAR to EC2
        env:
          EC2_HOST: ${{ secrets.EC2_HOST }}
          EC2_USER: ${{ secrets.EC2_USER }}
          EC2_PORT: ${{ secrets.EC2_PORT }}
        run: |
          set -e
          echo "Preparing SSH key"
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > id_rsa
          chmod 600 id_rsa

          echo "Ensuring remote deploy directory exists"
          ssh -o StrictHostKeyChecking=no -i id_rsa -p ${EC2_PORT:-22} ${EC2_USER}@${EC2_HOST} "mkdir -p ${EC2_DEPLOY_DIR}/target"

          echo "Copying WAR to remote host"
          scp -o StrictHostKeyChecking=no -i id_rsa -P ${EC2_PORT:-22} $WAR_GLOB ${EC2_USER}@${EC2_HOST}:${EC2_DEPLOY_DIR}/target/sitea.war

      - name: Run remote deploy commands on EC2
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          command_timeout: 30m
          script: |
            set -e
            cd /home/ubuntu/sitea_java
            sudo docker compose up -d --build --remove-orphans
            sudo docker image prune -f

      - name: Show remote logs (last 60 lines)
        uses: appleboy/ssh-action@master
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.SSH_PRIVATE_KEY }}
          port: ${{ secrets.EC2_PORT }}
          script: |
            set -e
            cd /home/ubuntu/sitea_java
            sudo docker compose logs --tail=60
